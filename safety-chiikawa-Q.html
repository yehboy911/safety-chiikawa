    <style>
        :root {
            --chiikawa-pink: #ffb8d1;
            --chiikawa-blue: #89cff0;
            --chiikawa-yellow: #fff59d;
            --chiikawa-brown: #5d4037;
            --chiikawa-green: #77dd77;
            --chiikawa-red: #ff6961;
            --chiikawa-orange: #ffcc80;
        }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            color: var(--chiikawa-brown);
            background-color: #fff;
            background-image: radial-gradient(var(--chiikawa-pink) 20%, transparent 20%),
                              radial-gradient(var(--chiikawa-blue) 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        .chiikawa-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--chiikawa-pink);
            border-radius: 30px;
            box-shadow: 8px 8px 0px var(--chiikawa-blue);
        }

        .btn-base {
            transition: all 0.1s;
            border-radius: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .btn-base:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .keypad-btn {
            background-color: var(--chiikawa-blue);
            color: white;
            font-size: 1.5rem;
            border-radius: 25px;
            height: 55px;
        }

        .action-btn {
            background-color: var(--chiikawa-yellow);
            color: var(--chiikawa-brown);
        }

        .tab-active {
            background-color: var(--chiikawa-pink);
            color: white;
            border: 3px solid var(--chiikawa-pink);
        }
        .tab-inactive {
            background-color: white;
            color: var(--chiikawa-brown);
            border: 3px solid var(--chiikawa-pink);
        }

        .choice-btn {
            transition: all 0.15s;
            border: 3px solid var(--chiikawa-blue);
            border-radius: 16px;
            padding: 10px 14px;
            font-weight: 700;
            font-size: 1rem;
            text-align: left;
            background: white;
            width: 100%;
            cursor: pointer;
        }
        .choice-btn:active {
            transform: scale(0.97);
        }
        .choice-btn.selected {
            border-color: var(--chiikawa-pink);
            background: rgba(255,184,209,0.15);
        }
        .choice-btn.correct {
            border-color: var(--chiikawa-green);
            background: rgba(119,221,119,0.2);
        }
        .choice-btn.wrong {
            border-color: var(--chiikawa-red);
            background: rgba(255,105,97,0.15);
        }

        ::-webkit-scrollbar { width: 0px; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake { animation: shake 0.5s; }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in { animation: pop 0.4s ease-out; }
    </style>

        const CATEGORIES = Object.keys(DATA);

        // ==========================================

        const playTone = (freq, type, duration) => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        };

        const playDingDong = () => {
            playTone(523.25, 'sine', 0.5);
            setTimeout(() => playTone(783.99, 'sine', 0.6), 200);
        };

        const playBuzz = () => {
            playTone(200, 'sawtooth', 0.3);
        };

        const ChoicePanel = ({ choices, onSelect, feedback, selectedIdx, correctIdx, disabled }) => {
            const labels = ["A", "B", "C", "D"];
            return (
                <div className="flex flex-col gap-2 w-full mt-2 px-1">
                    {choices.map((c, idx) => {
                        let cls = "choice-btn";
                        if (feedback === 'correct' && idx === correctIdx) cls += " correct";
                        else if (feedback === 'wrong' && idx === selectedIdx) cls += " wrong";
                        else if (feedback === 'wrong' && idx === correctIdx) cls += " correct";
                        else if (feedback === 'idle' && idx === selectedIdx) cls += " selected";

                        return (

        // ==========================================

        const App = () => {
            const [curCatIdx, setCurCatIdx] = useState(0);

            useEffect(() => {
                const loadVoices = () => {
                    const voices = window.speechSynthesis.getVoices();

                    // 嚴格的台灣口音優先順序
                    const twVoicePriority = [
                        // Apple 裝置台灣中文
                        v => v.name.includes("Mei-Jia"),
                        v => v.name.includes("美佳"),
                        // Google 台灣中文
                        v => v.name.includes("Google") && v.lang === "zh-TW",
                        // Microsoft 台灣中文
                        v => v.name.includes("Hsiao") && v.lang === "zh-TW",
                        v => v.name.includes("曉") && v.lang === "zh-TW",
                        // 任何明確標記 zh-TW 的聲音
                        v => v.lang === "zh-TW",
                        // 最後備選：zh-HK 港式中文（比大陸口音接近）
                        v => v.lang === "zh-HK",
                    ];

                    for (const matcher of twVoicePriority) {
                        const found = voices.find(matcher);
                        if (found) {
                            setTargetVoice(found);
                            console.log("已選擇語音:", found.name, found.lang);
                            return;
                        }
                    }

                    // 真的找不到任何中文語音才用預設
                    const anyZh = voices.find(v => v.lang.startsWith("zh"));

                        setTargetVoice(anyZh);
                        console.log("備選語音:", anyZh.name, anyZh.lang);

                window.speechSynthesis.onvoiceschanged = loadVoices;
                loadVoices();
                // Chrome 有時需要延遲載入
                setTimeout(loadVoices, 500);
                setTimeout(loadVoices, 1500);

            const speak = useCallback((text, checkMute) => {
                if (checkMute || !window.speechSynthesis) return;

                const utterance = new SpeechSynthesisUtterance(text);
                if (targetVoice) {
                    utterance.voice = targetVoice;
                }
                utterance.lang = 'zh-TW';
                utterance.pitch = 1.1;
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);

                    setCurQIdx(prev => prev + 1);

                    speak("恭喜完成這個單元！", isMuted);
                }
                setFeedback('idle');
                setInput("");
                setSelectedChoice(-1);
            };

            const handlePrevQuestion = () => {
                if (curQIdx > 0) setCurQIdx(prev => prev - 1);
            };

                if (feedback !== 'idle' || input === "") return;
                setTotalAnswered(prev => prev + 1);

                if (input === currentQ.a) {
                    setFeedback('correct');
                    setScore(prev => prev + 1);
                    if (!isMuted) playDingDong();

                    const randomPraise = praises[Math.floor(Math.random() * praises.length)];
                    setPraise(randomPraise);
                    setTimeout(() => speak(randomPraise, isMuted), 1400);
                    setTimeout(() => { handleNextQuestion(); }, 3500);
                } else {
                    setFeedback('wrong');
                    if (!isMuted) playBuzz();
                    const randomEncourage = encourages[Math.floor(Math.random() * encourages.length)];

                    setTimeout(() => {
                        setInput("");
                        setFeedback('idle');
                    }, 1500);
                }
            };

            // 選擇題選擇答案
            const handleChoiceSelect = (idx) => {
                if (feedback !== 'idle') return;
                setSelectedChoice(idx);
            };

            // 選擇題確認答案
            const handleChoiceConfirm = () => {
                if (feedback !== 'idle' || selectedChoice === -1) return;
                setTotalAnswered(prev => prev + 1);

                if (selectedChoice === currentQ.a) {
                    setFeedback('correct');
                    setScore(prev => prev + 1);

                    setTimeout(() => { handleNextQuestion(); }, 3000);

                    setFeedback('wrong');
                    if (!isMuted) playBuzz();

                    setTimeout(() => {
                        setSelectedChoice(-1);
                        setFeedback('idle');
                    }, 2000);
                }
            };

            // 計算總題數
            const totalQuestions = Object.values(DATA).reduce((sum, arr) => sum + arr.length, 0);

                                {isMuted ? "🔕" : "🔔"}
                            </button>
                        </div>
                    </div>

                    {/* Category Selector */}
                    <div className="px-4 py-1.5">
                        <select
                            value={curCatIdx}
                            onChange={(e) => setCurCatIdx(Number(e.target.value))}
                            className="w-full p-2.5 rounded-2xl border-2 border-[var(--chiikawa-blue)] bg-white text-[var(--chiikawa-brown)] font-bold text-base outline-none text-center appearance-none"
                            style={{ backgroundImage: 'none' }}
                        >
                            {CATEGORIES.map((cat, idx) => (
                                <option key={cat} value={idx}>
                                    {cat}（{DATA[cat].length}題）
                                </option>
                            ))}
                        </select>
                    </div>

                    {/* Mode Tabs */}
                    <div className="flex px-4 gap-2 mb-1.5">
                        <button
                            onClick={() => setMode('recite')}
                            className={`flex-1 py-2 rounded-t-2xl font-bold text-sm ${mode === 'recite' ? 'tab-active' : 'tab-inactive'}`}
                        >
                            📖 學習
                        </button>
                        <button
                            onClick={() => setMode('quiz')}
                            className={`flex-1 py-2 rounded-t-2xl font-bold text-sm ${mode === 'quiz' ? 'tab-active' : 'tab-inactive'}`}
                        >
                            ✨ 測驗
                        </button>
                    </div>

                    {/* Main Display Area */}
                    <div className="flex-1 px-3 pb-1 flex flex-col min-h-0 overflow-hidden">
                        <div className={`chiikawa-card flex-1 p-4 flex flex-col items-center relative overflow-y-auto transition-all duration-300 ${feedback === 'correct' ? 'scale-[1.02] border-[var(--chiikawa-green)]' : ''} ${feedback === 'wrong' ? 'shake border-[var(--chiikawa-red)]' : ''}`}>

                            {/* Question Number Badge */}
                            <div className="flex justify-between w-full mb-2">
                                <div className="bg-[var(--chiikawa-blue)] text-white px-3 py-1 rounded-full text-xs font-bold">
                                    Q{curQIdx + 1}/{currentQuestions.length}
                                </div>
                                <div className={`px-3 py-1 rounded-full text-xs font-bold ${currentQ.type === 'number' ? 'bg-[var(--chiikawa-orange)] text-[var(--chiikawa-brown)]' : 'bg-[var(--chiikawa-pink)] text-white'}`}>
                                    {currentQ.type === 'number' ? '🔢 數字題' : '📝 選擇題'}
                                </div>
                            </div>

                            {/* Content */}
                            <div className="w-full text-center z-10 flex-1">
                                {mode === 'recite' ? (
                                    <>
                                        <div className="text-lg font-bold mb-3">{currentQ.q}</div>
                                        {currentQ.type === 'number' ? (
                                            <div className="text-3xl font-black text-[var(--chiikawa-pink)] mb-2">
                                                {currentQ.displayA || currentQ.a}
                                                <span className="text-xl text-[var(--chiikawa-brown)] ml-1">{currentQ.unit}</span>
                                            </div>
                                        ) : (
                                            <div className="text-xl font-black text-[var(--chiikawa-pink)] mb-2 px-2 py-2 bg-pink-50 rounded-xl">
                                                {currentQ.choices[currentQ.a]}
                                            </div>
                                        )}
                                        <div className="mt-3 p-3 bg-[var(--chiikawa-yellow)]/30 rounded-xl text-sm leading-relaxed text-left whitespace-pre-line">
                                            {currentQ.context}
                                        </div>

                                        <div className="flex justify-between mt-4 w-full px-4">
                                            <button onClick={handlePrevQuestion} disabled={curQIdx===0} className="w-11 h-11 bg-[var(--chiikawa-blue)] rounded-full text-white text-xl disabled:opacity-30">←</button>
                                            <button onClick={() => speak(currentQ.context, isMuted)} className="w-11 h-11 bg-[var(--chiikawa-pink)] rounded-full text-white text-lg">🔊</button>
                                            <button onClick={handleNextQuestion} className="w-11 h-11 bg-[var(--chiikawa-blue)] rounded-full text-white text-xl">→</button>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div className="text-base font-bold mb-3 text-left">{currentQ.q}</div>

                                        {currentQ.type === 'number' ? (
                                            <>
                                                <div className="bg-[var(--chiikawa-brown)] text-[var(--chiikawa-yellow)] p-3 rounded-2xl text-3xl font-mono min-h-[60px] flex items-center justify-center border-4 border-gray-300 shadow-inner w-full max-w-[180px] mx-auto mb-1">
                                                    {input || "?"}
                                                </div>
                                                <div className="text-xs text-gray-400 mb-1 h-4">{currentQ.inputHint}</div>
                                            </>
                                        ) : (
                                            <>
                                                <ChoicePanel
                                                    choices={currentQ.choices}
                                                    onSelect={handleChoiceSelect}
                                                    feedback={feedback}
                                                    selectedIdx={selectedChoice}
                                                    correctIdx={currentQ.a}
                                                    disabled={feedback !== 'idle'}
                                                />
                                                {feedback === 'idle' && selectedChoice >= 0 && (
                                                    <button
                                                        onClick={handleChoiceConfirm}
                                                        className="mt-3 btn-base px-8 py-2 text-lg mx-auto"
                                                        style={{ backgroundColor: 'var(--chiikawa-green)', color: 'white' }}
                                                    >
                                                        ✨ 確定
                                                    </button>
                                                )}
                                            </>
                                        )}

                                        {/* Feedback Overlay */}
                                        {feedback === 'correct' && (
                                            <div className="absolute inset-0 flex items-center justify-center bg-white/85 z-20 flex-col pop-in">
                                                <div className="text-5xl mb-2">🎉</div>
                                                <div className="text-2xl font-black text-[var(--chiikawa-green)]">{praise}</div>
                                            </div>
                                        )}
                                        {feedback === 'wrong' && (
                                            <div className="absolute inset-0 flex items-center justify-center bg-white/85 z-20 pop-in">
                                                <div className="text-2xl font-black text-[var(--chiikawa-red)]">
                                                    {encourages[Math.floor(Math.random() * encourages.length)]}
                                                </div>
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>

                            {/* Decorative */}
                            <div className="absolute -bottom-10 -right-10 w-28 h-28 bg-[var(--chiikawa-yellow)] rounded-full opacity-20"></div>
                            <div className="absolute top-10 -left-10 w-16 h-16 bg-[var(--chiikawa-pink)] rounded-full opacity-20"></div>
                        </div>
                    </div>

                    {/* Keypad (Only for number-type quiz questions) */}
                    {mode === 'quiz' && currentQ.type === 'number' && (
                        <div className="flex-none">
                            <Keypad
                                onInput={handleInput}
                                onClear={handleClear}
                                onEnter={handleCheck}
                                disabled={feedback !== 'idle'}
                            />
                        </div>
                    )}

                    {/* Bottom info bar for total questions */}
                    <div className="text-center text-xs text-gray-400 py-1">
                        共 {totalQuestions} 題 ｜ 資料來源：台灣全民安全指引（國防部）
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
